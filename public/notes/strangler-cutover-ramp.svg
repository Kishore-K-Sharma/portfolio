<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ramp">
  <title id="t-ramp">Cutover ramp: 5% → 25% → 100% with rollback</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">RAMP OVER DAYS · NOT MINUTES · ROLLBACK IS A CONFIG FLIP</text>

  <!-- 5% -->
  <text x="120" y="80" text-anchor="middle" class="acc">DAY 1 · 5%</text>
  <rect x="40" y="92" width="160" height="48" rx="3" class="s"/>
  <rect x="40" y="92" width="8" height="48" class="fs"/>
  <rect x="40" y="92" width="8" height="48" class="a"/>
  <text x="120" y="120" text-anchor="middle" class="mono">canary</text>
  <text x="120" y="158" text-anchor="middle" class="label">WATCH FOR 24-48H</text>

  <!-- 25% -->
  <text x="320" y="80" text-anchor="middle" class="acc">DAY 3 · 25%</text>
  <rect x="240" y="92" width="160" height="48" rx="3" class="s"/>
  <rect x="240" y="92" width="40" height="48" class="fs"/>
  <rect x="240" y="92" width="40" height="48" class="a"/>
  <text x="320" y="120" text-anchor="middle" class="mono">soak</text>
  <text x="320" y="158" text-anchor="middle" class="label">SAME METRIC · STAYING GREEN</text>

  <!-- 50% -->
  <text x="520" y="80" text-anchor="middle" class="acc">DAY 7 · 50%</text>
  <rect x="440" y="92" width="160" height="48" rx="3" class="s"/>
  <rect x="440" y="92" width="80" height="48" class="fs"/>
  <rect x="440" y="92" width="80" height="48" class="a"/>
  <text x="520" y="120" text-anchor="middle" class="mono">load test in real</text>
  <text x="520" y="158" text-anchor="middle" class="label">FIND SCALING ISSUES</text>

  <!-- 100% -->
  <text x="720" y="80" text-anchor="middle" class="acc">DAY 14 · 100%</text>
  <rect x="640" y="92" width="120" height="48" rx="3" class="fs"/>
  <rect x="640" y="92" width="120" height="48" rx="3" class="a"/>
  <text x="700" y="120" text-anchor="middle" class="mono">cutover complete</text>
  <text x="700" y="158" text-anchor="middle" class="label">LEGACY STILL WARM</text>

  <line x1="40" y1="190" x2="760" y2="190" class="sm"/>

  <!-- Rollback path -->
  <text x="40" y="216" class="label">ANY METRIC RED → ONE FLIP TO PREVIOUS PERCENTAGE</text>

  <rect x="40" y="234" width="720" height="32" rx="3" class="s"/>
  <text x="80" y="254" class="mono">5% → 25% → 50% → 100%</text>
  <line x1="280" y1="248" x2="280" y2="270" class="a" stroke-dasharray="3 2"/>
  <text x="290" y="254" class="acc">rollback path</text>
  <line x1="290" y1="252" x2="80" y2="252" class="a" stroke-dasharray="3 2"/>
  <polygon points="80,252 90,247 90,257" class="fa"/>
</svg>
