<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-priority">
  <title id="t-priority">Three-priority outbound buffer for backpressure</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">OUTBOUND BUFFER PER CONNECTION · 3 PRIORITIES</text>

  <!-- Critical -->
  <rect x="40" y="64" width="720" height="56" rx="3" class="s"/>
  <text x="60" y="86" class="acc">critical</text>
  <text x="60" y="104" class="label">QUIZ ANSWERS · SUBMISSIONS · PAYMENT EVENTS</text>
  <text x="540" y="96" class="text">always delivered</text>
  <line x1="640" y1="92" x2="740" y2="92" class="a"/>
  <polygon points="740,92 730,87 730,97" class="fa"/>

  <!-- Normal -->
  <rect x="40" y="132" width="720" height="56" rx="3" class="s"/>
  <text x="60" y="154" class="acc">normal</text>
  <text x="60" y="172" class="label">CHAT MESSAGES · STATE UPDATES</text>
  <text x="540" y="164" class="text">drop oldest under load</text>
  <line x1="640" y1="160" x2="740" y2="160" class="a"/>
  <polygon points="740,160 730,155 730,165" class="fa"/>

  <!-- Best-effort -->
  <rect x="40" y="200" width="720" height="56" rx="3" class="s"/>
  <text x="60" y="222" class="danger">best-effort</text>
  <text x="60" y="240" class="label">TYPING INDICATORS · PRESENCE · CURSOR POSITIONS</text>
  <text x="540" y="232" class="text">drop first under load</text>
  <line x1="640" y1="228" x2="700" y2="228" class="dg"/>
  <text x="710" y="232" class="danger">××</text>

  <text x="40" y="290" class="label">UNDER LOAD · DROP BEST-EFFORT FIRST · PROTECT CRITICAL ALWAYS</text>
  <text x="40" y="306" class="label">GRACEFUL DROP &gt;&gt; UNGRACEFUL CRASH</text>
</svg>
