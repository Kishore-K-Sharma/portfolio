<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-tradeoff">
  <title id="t-tradeoff">CSP nonce cost: dynamic rendering vs static</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">PER-REQUEST NONCE FORCES DYNAMIC RENDERING · TRADE-OFF</text>

  <!-- Static path -->
  <text x="200" y="78" text-anchor="middle" class="acc">STATIC NONCE · BUILD-TIME</text>

  <rect x="40" y="92" width="320" height="40" rx="3" class="s"/>
  <text x="60" y="116" class="mono">build → write CSP into HTML</text>
  <text x="340" y="116" text-anchor="end" class="acc">FAST ·</text>

  <rect x="40" y="140" width="320" height="40" rx="3" class="s"/>
  <text x="60" y="164" class="mono">browser → cached HTML</text>
  <text x="340" y="164" text-anchor="end" class="acc">CDN HIT</text>

  <rect x="40" y="188" width="320" height="40" rx="3" class="s"/>
  <text x="60" y="212" class="mono">attacker → knows nonce</text>
  <text x="340" y="212" text-anchor="end" class="danger">×× WEAK</text>

  <text x="200" y="260" text-anchor="middle" class="text">CSP is theatre — same nonce on every page</text>
  <text x="200" y="280" text-anchor="middle" class="label">CHEAPER · LESS PROTECTION</text>

  <!-- Per-request path -->
  <text x="600" y="78" text-anchor="middle" class="acc">PER-REQUEST NONCE</text>

  <rect x="440" y="92" width="320" height="40" rx="3" class="fs"/>
  <rect x="440" y="92" width="320" height="40" rx="3" class="a"/>
  <text x="460" y="116" class="mono">request → middleware → nonce</text>
  <text x="740" y="116" text-anchor="end" class="acc">PER-REQUEST</text>

  <rect x="440" y="140" width="320" height="40" rx="3" class="fs"/>
  <rect x="440" y="140" width="320" height="40" rx="3" class="a"/>
  <text x="460" y="164" class="mono">layout → reads headers()</text>
  <text x="740" y="164" text-anchor="end" class="acc">DYNAMIC SSR</text>

  <rect x="440" y="188" width="320" height="40" rx="3" class="fs"/>
  <rect x="440" y="188" width="320" height="40" rx="3" class="a"/>
  <text x="460" y="212" class="mono">attacker → no way to know it</text>
  <text x="740" y="212" text-anchor="end" class="acc">XSS BLOCKED</text>

  <text x="600" y="260" text-anchor="middle" class="text">CSP is real — fresh nonce every page</text>
  <text x="600" y="280" text-anchor="middle" class="label">FUNCTION INVOCATION PER REQUEST · STRONG XSS DEFENSE</text>

  <text x="400" y="310" text-anchor="middle" class="label">WHOLE CLASS OF ATTACKS DOES NOT WORK = WORTH THE COST</text>
</svg>
