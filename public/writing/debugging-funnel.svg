<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#1e293b" rx="8"/>
  
  <!-- Funnel Shape -->
  <polygon points="100,50 700,50 450,250 350,250" fill="#334155" stroke="#475569" stroke-width="2"/>
  
  <!-- Step 1 -->
  <rect x="250" y="70" width="300" height="40" fill="#1e293b" rx="4"/>
  <text x="400" y="95" fill="#e2e8f0" font-family="sans-serif" font-size="16" text-anchor="middle">Reproduce the Issue</text>
  
  <!-- Step 2 -->
  <rect x="280" y="120" width="240" height="40" fill="#1e293b" rx="4"/>
  <text x="400" y="145" fill="#e2e8f0" font-family="sans-serif" font-size="16" text-anchor="middle">Read the Stack Trace</text>

  <!-- Step 3 -->
  <rect x="320" y="170" width="160" height="40" fill="#1e293b" rx="4"/>
  <text x="400" y="195" fill="#e2e8f0" font-family="sans-serif" font-size="16" text-anchor="middle">Divide &amp; Conquer</text>

  <!-- Result -->
  <rect x="360" y="260" width="80" height="30" fill="#10b981" rx="4"/>
  <text x="400" y="280" fill="#064e3b" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Fix</text>
</svg>
