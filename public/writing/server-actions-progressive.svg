<svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-prog">
  <title id="t-prog">Progressive enhancement: form works even without JS</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">PROGRESSIVE ENHANCEMENT · BOTH PATHS WORK</text>

  <!-- Js works -->
  <text x="40" y="76" class="acc">JS LOADED · NORMAL PATH</text>
  <rect x="40" y="92" width="160" height="44" rx="4" class="s"/>
  <text x="120" y="118" text-anchor="middle" class="mono">user submits</text>
  <line x1="200" y1="114" x2="240" y2="114" class="a"/>
  <polygon points="240,114 230,109 230,119" class="fa"/>
  <rect x="240" y="92" width="160" height="44" rx="4" class="s"/>
  <text x="320" y="118" text-anchor="middle" class="text">react intercepts</text>
  <line x1="400" y1="114" x2="440" y2="114" class="a"/>
  <polygon points="440,114 430,109 430,119" class="fa"/>
  <rect x="440" y="92" width="160" height="44" rx="4" class="fs"/>
  <rect x="440" y="92" width="160" height="44" rx="4" class="a"/>
  <text x="520" y="118" text-anchor="middle" class="acc">action runs</text>
  <line x1="600" y1="114" x2="640" y2="114" class="a"/>
  <polygon points="640,114 630,109 630,119" class="fa"/>
  <rect x="640" y="92" width="120" height="44" rx="4" class="s"/>
  <text x="700" y="114" text-anchor="middle" class="mono">page updates</text>
  <text x="700" y="128" text-anchor="middle" class="label">IN PLACE</text>

  <line x1="40" y1="170" x2="760" y2="170" class="sm"/>

  <!-- JS fails -->
  <text x="40" y="196" class="danger">JS BLOCKED · GRACEFUL FALLBACK</text>
  <rect x="40" y="212" width="160" height="44" rx="4" class="s"/>
  <text x="120" y="238" text-anchor="middle" class="mono">user submits</text>
  <line x1="200" y1="234" x2="240" y2="234" class="a"/>
  <polygon points="240,234 230,229 230,239" class="fa"/>
  <rect x="240" y="212" width="160" height="44" rx="4" class="s"/>
  <text x="320" y="232" text-anchor="middle" class="text">browser POSTs</text>
  <text x="320" y="248" text-anchor="middle" class="label">REAL HTML FORM</text>
  <line x1="400" y1="234" x2="440" y2="234" class="a"/>
  <polygon points="440,234 430,229 430,239" class="fa"/>
  <rect x="440" y="212" width="160" height="44" rx="4" class="fs"/>
  <rect x="440" y="212" width="160" height="44" rx="4" class="a"/>
  <text x="520" y="238" text-anchor="middle" class="acc">action runs</text>
  <line x1="600" y1="234" x2="640" y2="234" class="a"/>
  <polygon points="640,234 630,229 630,239" class="fa"/>
  <rect x="640" y="212" width="120" height="44" rx="4" class="s"/>
  <text x="700" y="234" text-anchor="middle" class="mono">page reloads</text>
  <text x="700" y="248" text-anchor="middle" class="label">FULL POST</text>
</svg>
