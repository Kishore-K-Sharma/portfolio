<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-strangler">
  <title id="t-strangler">Strangler pattern: facade routes traffic between legacy and new</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .ft{fill:#1a1a24}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.ft{fill:#e8e4d8}.fs{fill:#1a1a24}
    }
  </style>

  <!-- Stage 1: Before -->
  <text x="40" y="36" class="label">01 — BEFORE · ALL TRAFFIC HITS LEGACY</text>
  <rect x="60" y="60" width="100" height="46" rx="4" class="s"/>
  <text x="110" y="88" text-anchor="middle" class="mono">users</text>
  <line x1="160" y1="83" x2="500" y2="83" class="a"/>
  <polygon points="500,83 490,78 490,88" class="fa"/>
  <rect x="500" y="60" width="240" height="46" rx="4" class="s"/>
  <text x="620" y="88" text-anchor="middle" class="mono">legacy monolith (12 yrs old)</text>

  <line x1="40" y1="138" x2="760" y2="138" class="sm"/>

  <!-- Stage 2: Facade introduced, partial migration -->
  <text x="40" y="170" class="label">02 — FACADE ROUTES BY PATH · NEW CODE GROWS</text>
  <rect x="60" y="196" width="100" height="46" rx="4" class="s"/>
  <text x="110" y="224" text-anchor="middle" class="mono">users</text>
  <line x1="160" y1="219" x2="280" y2="219" class="a"/>
  <polygon points="280,219 270,214 270,224" class="fa"/>

  <rect x="280" y="196" width="120" height="46" rx="4" class="fs"/>
  <rect x="280" y="196" width="120" height="46" rx="4" class="a"/>
  <text x="340" y="218" text-anchor="middle" class="acc">routing facade</text>
  <text x="340" y="234" text-anchor="middle" class="label">CONFIG · NOT CODE</text>

  <!-- Read paths to new -->
  <line x1="400" y1="208" x2="560" y2="180" class="a"/>
  <polygon points="560,180 549,179 553,188" class="fa"/>
  <text x="480" y="178" class="acc">/v2/applications  /v2/profile</text>
  <rect x="560" y="170" width="180" height="34" rx="3" class="s"/>
  <text x="650" y="192" text-anchor="middle" class="mono">new service · read paths</text>

  <!-- Write paths still legacy -->
  <line x1="400" y1="230" x2="560" y2="258" class="a" stroke-dasharray="4 3"/>
  <polygon points="560,258 549,259 553,250" class="fa"/>
  <text x="480" y="262" class="label">EVERYTHING ELSE</text>
  <rect x="560" y="234" width="180" height="34" rx="3" class="s"/>
  <text x="650" y="256" text-anchor="middle" class="mono">legacy · write paths</text>

  <line x1="40" y1="298" x2="760" y2="298" class="sm"/>

  <!-- Stage 3: Shadow + cutover -->
  <text x="40" y="328" class="label">03 — SHADOW · COMPARE · CUTOVER · DELETE</text>

  <rect x="60" y="354" width="160" height="40" rx="4" class="s"/>
  <text x="140" y="378" text-anchor="middle" class="text">shadow traffic</text>
  <line x1="220" y1="374" x2="280" y2="374" class="a"/>
  <polygon points="280,374 270,369 270,379" class="fa"/>

  <rect x="280" y="354" width="160" height="40" rx="4" class="s"/>
  <text x="360" y="378" text-anchor="middle" class="text">diff log → fix</text>
  <line x1="440" y1="374" x2="500" y2="374" class="a"/>
  <polygon points="500,374 490,369 490,379" class="fa"/>

  <rect x="500" y="354" width="160" height="40" rx="4" class="fs"/>
  <rect x="500" y="354" width="160" height="40" rx="4" class="a"/>
  <text x="580" y="378" text-anchor="middle" class="acc">5% · 25% · 100%</text>

  <text x="400" y="430" text-anchor="middle" class="label">FACADE IS THE ONLY THING THAT KNOWS ABOUT THE MIGRATION</text>
</svg>
