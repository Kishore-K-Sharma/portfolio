<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#1e293b" rx="8"/>
  <text x="400" y="50" fill="#e2e8f0" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold">The Momentum Conflict</text>
  
  <rect x="50" y="100" width="200" height="120" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="150" y="150" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">Fast Swipe Event</text>
  <text x="150" y="180" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">(Native Momentum)</text>

  <path d="M 270 160 L 330 160" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
  
  <rect x="350" y="100" width="200" height="120" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="450" y="150" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">Browser Scrolls</text>
  <text x="450" y="180" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">Multiple slides at once</text>

  <path d="M 570 160 L 630 160" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="650" y="100" width="100" height="120" fill="#7f1d1d" rx="8" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="150" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">React State</text>
  <text x="700" y="180" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">Out of Sync</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e" />
    </marker>
  </defs>
</svg>
