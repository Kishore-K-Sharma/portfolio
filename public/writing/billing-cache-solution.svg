<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#1e293b" rx="8"/>
  <text x="400" y="40" fill="#e2e8f0" font-family="sans-serif" font-size="22" text-anchor="middle" font-weight="bold">Bulk Fetching &amp; O(1) Lookups</text>
  
  <rect x="50" y="70" width="200" height="60" fill="#064e3b" rx="8" stroke="#10b981" stroke-width="2"/>
  <text x="150" y="105" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">1x Bulk API Fetch</text>

  <rect x="50" y="150" width="200" height="60" fill="#064e3b" rx="8" stroke="#10b981" stroke-width="2"/>
  <text x="150" y="185" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">1x Bulk DB Fetch</text>
  
  <path d="M 260 100 L 330 140" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M 260 180 L 330 160" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  
  <rect x="350" y="110" width="160" height="100" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="430" y="155" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">In-Memory Map</text>
  
  <path d="M 520 160 L 600 160" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  
  <rect x="620" y="110" width="130" height="100" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="685" y="150" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">For Loop</text>
  <text x="685" y="175" fill="#a7f3d0" font-family="sans-serif" font-size="14" text-anchor="middle">Instant O(1)</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
