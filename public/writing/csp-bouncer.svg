<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-bouncer">
  <title id="t-bouncer">CSP as a bouncer with a guest list</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.dg{stroke:#d97a7a}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">BROWSER · BOUNCER · GUEST LIST = CSP</text>

  <!-- Scripts queue -->
  <text x="40" y="74" class="label">SCRIPTS WANT IN</text>

  <rect x="40" y="92" width="240" height="36" rx="3" class="s"/>
  <text x="60" y="116" class="acc">your hydration script</text>
  <text x="260" y="116" text-anchor="end" class="acc">nonce ✓</text>

  <rect x="40" y="136" width="240" height="36" rx="3" class="s"/>
  <text x="60" y="160" class="acc">google analytics loader</text>
  <text x="260" y="160" text-anchor="end" class="acc">nonce ✓</text>

  <rect x="40" y="180" width="240" height="36" rx="3" class="s"/>
  <text x="60" y="204" class="acc">turnstile widget</text>
  <text x="260" y="204" text-anchor="end" class="acc">nonce ✓</text>

  <rect x="40" y="224" width="240" height="36" rx="3" class="s"/>
  <text x="60" y="248" class="danger">injected attacker script</text>
  <text x="260" y="248" text-anchor="end" class="danger">no nonce ××</text>

  <!-- Bouncer in middle -->
  <rect x="320" y="92" width="160" height="168" rx="6" class="fs"/>
  <rect x="320" y="92" width="160" height="168" rx="6" class="a"/>
  <text x="400" y="120" text-anchor="middle" class="acc">browser</text>
  <text x="400" y="142" text-anchor="middle" class="text">checks CSP</text>
  <line x1="340" y1="160" x2="460" y2="160" class="sm"/>
  <text x="400" y="184" text-anchor="middle" class="label">script-src</text>
  <text x="400" y="204" text-anchor="middle" class="label">'nonce-XYZ'</text>
  <text x="400" y="224" text-anchor="middle" class="label">'strict-dynamic'</text>

  <!-- Decisions -->
  <line x1="280" y1="110" x2="320" y2="110" class="a"/>
  <polygon points="320,110 310,105 310,115" class="fa"/>
  <line x1="280" y1="154" x2="320" y2="154" class="a"/>
  <polygon points="320,154 310,149 310,159" class="fa"/>
  <line x1="280" y1="198" x2="320" y2="198" class="a"/>
  <polygon points="320,198 310,193 310,203" class="fa"/>
  <line x1="280" y1="242" x2="320" y2="242" class="dg"/>
  <polygon points="320,242 310,237 310,247" class="fd"/>

  <!-- Outcomes on the right -->
  <line x1="480" y1="110" x2="520" y2="110" class="a"/>
  <polygon points="520,110 510,105 510,115" class="fa"/>
  <rect x="520" y="92" width="240" height="36" rx="3" class="s"/>
  <text x="640" y="116" text-anchor="middle" class="acc">EXECUTES</text>

  <line x1="480" y1="154" x2="520" y2="154" class="a"/>
  <polygon points="520,154 510,149 510,159" class="fa"/>
  <rect x="520" y="136" width="240" height="36" rx="3" class="s"/>
  <text x="640" y="160" text-anchor="middle" class="acc">EXECUTES</text>

  <line x1="480" y1="198" x2="520" y2="198" class="a"/>
  <polygon points="520,198 510,193 510,203" class="fa"/>
  <rect x="520" y="180" width="240" height="36" rx="3" class="s"/>
  <text x="640" y="204" text-anchor="middle" class="acc">EXECUTES</text>

  <line x1="480" y1="242" x2="520" y2="242" class="dg"/>
  <polygon points="520,242 510,237 510,247" class="fd"/>
  <rect x="520" y="224" width="240" height="36" rx="3" class="s"/>
  <text x="640" y="248" text-anchor="middle" class="danger">BLOCKED</text>

  <text x="400" y="296" text-anchor="middle" class="label">NONCE ON THE GUEST LIST = RUN · NO NONCE = REFUSED AT THE DOOR</text>
</svg>
