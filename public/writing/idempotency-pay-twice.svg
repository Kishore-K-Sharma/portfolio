<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-pay">
  <title id="t-pay">A user double-tapping pay because the page hung</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .dg{stroke:#c14545;fill:none;stroke-width:1.25;stroke-dasharray:5 4}
    .fa{fill:#6028d9}
    .fd{fill:#c14545}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.dg{stroke:#d97a7a}.a{stroke:#b89be8}
      .fa{fill:#b89be8}.fd{fill:#d97a7a}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">USER · BAD NETWORK · IMPATIENT TAP</text>

  <!-- phone outline -->
  <rect x="60" y="64" width="160" height="220" rx="14" class="s"/>
  <rect x="76" y="80" width="128" height="166" rx="3" class="fs"/>
  <rect x="76" y="80" width="128" height="166" rx="3" class="s"/>
  <text x="140" y="118" text-anchor="middle" class="mono">amount</text>
  <text x="140" y="138" text-anchor="middle" class="acc">₹500</text>
  <rect x="92" y="190" width="96" height="36" rx="4" class="a"/>
  <text x="140" y="213" text-anchor="middle" class="acc">PAY NOW</text>
  <text x="140" y="270" text-anchor="middle" class="label">TAP · 0s</text>

  <!-- spinner / hung -->
  <text x="270" y="120" class="text">page hangs…</text>
  <text x="270" y="140" class="label">NETWORK BLIP</text>
  <line x1="240" y1="160" x2="380" y2="160" class="dg"/>
  <text x="270" y="182" class="danger">×× RESPONSE LOST</text>

  <!-- second tap phone -->
  <rect x="420" y="64" width="160" height="220" rx="14" class="s"/>
  <rect x="436" y="80" width="128" height="166" rx="3" class="fs"/>
  <rect x="436" y="80" width="128" height="166" rx="3" class="s"/>
  <text x="500" y="118" text-anchor="middle" class="mono">amount</text>
  <text x="500" y="138" text-anchor="middle" class="acc">₹500</text>
  <rect x="452" y="190" width="96" height="36" rx="4" class="dg"/>
  <text x="500" y="213" text-anchor="middle" class="danger">PAY NOW</text>
  <text x="500" y="270" text-anchor="middle" class="label">TAP AGAIN · 4s</text>

  <!-- The two outcomes -->
  <line x1="600" y1="100" x2="640" y2="100" class="a"/>
  <polygon points="640,100 630,95 630,105" class="fa"/>
  <text x="660" y="92" class="acc">idempotent server</text>
  <text x="660" y="110" class="text">→ ₹500 charged once</text>

  <line x1="600" y1="180" x2="640" y2="180" class="dg"/>
  <polygon points="640,180 630,175 630,185" class="fd"/>
  <text x="660" y="172" class="danger">naïve server</text>
  <text x="660" y="190" class="text">→ ₹1,000 charged · refund flow</text>

  <text x="400" y="306" text-anchor="middle" class="label">ONE LOGICAL OPERATION · TWO NETWORK ATTEMPTS</text>
</svg>
