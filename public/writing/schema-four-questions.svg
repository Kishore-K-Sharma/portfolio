<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-fourq">
  <title id="t-fourq">Four questions to answer before drawing a single component</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">FOUR QUESTIONS BEFORE THE FIRST COMPONENT</text>

  <!-- Q1 -->
  <rect x="40" y="64" width="360" height="120" rx="4" class="s"/>
  <text x="60" y="88" class="acc">01 · entities</text>
  <text x="60" y="112" class="text">what nouns exist?</text>
  <text x="60" y="136" class="mono">application · applicant · document</text>
  <text x="60" y="156" class="mono">underwriter · disbursement · audit</text>
  <text x="60" y="174" class="label">CAN'T NAME THEM = DON'T UNDERSTAND THE WORK</text>

  <!-- Q2 -->
  <rect x="420" y="64" width="340" height="120" rx="4" class="s"/>
  <text x="440" y="88" class="acc">02 · relationships</text>
  <text x="440" y="112" class="text">how do they connect?</text>
  <text x="440" y="136" class="mono">application — applicant : 1..N or N..N?</text>
  <text x="440" y="156" class="mono">underwriter — application : 1..N or N..N?</text>
  <text x="440" y="174" class="label">CARDINALITIES ARE WHERE THE DESIGN LIVES</text>

  <!-- Q3 -->
  <rect x="40" y="200" width="360" height="120" rx="4" class="s"/>
  <text x="60" y="224" class="acc">03 · lifecycle</text>
  <text x="60" y="248" class="text">what states · what transitions?</text>
  <text x="60" y="272" class="mono">draft → submitted → approved → disbursed</text>
  <text x="60" y="292" class="mono">+ cancelled? expired? partial?</text>
  <text x="60" y="310" class="label">FORGOTTEN STATES BUG YOU FOREVER</text>

  <!-- Q4 -->
  <rect x="420" y="200" width="340" height="120" rx="4" class="fs"/>
  <rect x="420" y="200" width="340" height="120" rx="4" class="a"/>
  <text x="440" y="224" class="acc">04 · source of truth</text>
  <text x="440" y="248" class="text">whose value wins?</text>
  <text x="440" y="272" class="mono">amount: applicant_set vs underwriter_override</text>
  <text x="440" y="292" class="mono">→ which is the system acting on RIGHT NOW?</text>
  <text x="440" y="310" class="label">"AUDIT LOG" IS NOT THE ANSWER</text>

  <text x="400" y="346" text-anchor="middle" class="label">ANSWER FOUR · GET A SCHEMA · ANSWER TWO · GET A MIGRATION</text>
</svg>
