<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#1e293b" rx="8"/>
  <text x="400" y="40" fill="#e2e8f0" font-family="sans-serif" font-size="22" text-anchor="middle" font-weight="bold">The N+1 Problem in a Loop</text>
  
  <rect x="50" y="80" width="150" height="180" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="125" y="120" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">For Loop</text>
  <text x="125" y="150" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">30 Iterations</text>
  
  <path d="M 210 110 L 450 110" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="330" y="100" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">30x API Calls</text>
  
  <path d="M 210 170 L 450 170" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="330" y="160" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">30x DB Queries</text>
  
  <rect x="470" y="80" width="150" height="80" fill="#7f1d1d" rx="8" stroke="#ef4444" stroke-width="2"/>
  <text x="545" y="125" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">External API</text>
  
  <rect x="470" y="180" width="150" height="80" fill="#7f1d1d" rx="8" stroke="#ef4444" stroke-width="2"/>
  <text x="545" y="225" fill="#f8fafc" font-family="sans-serif" font-size="16" text-anchor="middle">Database</text>
  
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e" />
    </marker>
  </defs>
</svg>
