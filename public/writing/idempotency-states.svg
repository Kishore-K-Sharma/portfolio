<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-idem-states">
  <title id="t-idem-states">Three states of an idempotency key in Redis</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">KEY STATE MACHINE</text>

  <!-- State 1: Absent -->
  <rect x="60" y="80" width="200" height="86" rx="4" class="s"/>
  <text x="160" y="106" text-anchor="middle" class="acc">absent</text>
  <text x="160" y="132" text-anchor="middle" class="text">no key in redis</text>
  <text x="160" y="152" text-anchor="middle" class="label">→ CLAIM · DO WORK · WRITE RESPONSE</text>

  <!-- State 2: Pending -->
  <rect x="300" y="80" width="200" height="86" rx="4" class="s"/>
  <text x="400" y="106" text-anchor="middle" class="acc">pending</text>
  <text x="400" y="132" text-anchor="middle" class="text">claim in flight</text>
  <text x="400" y="152" text-anchor="middle" class="label">→ POLL WITH BACKOFF · DEADLINE</text>

  <!-- State 3: Done -->
  <rect x="540" y="80" width="200" height="86" rx="4" class="s"/>
  <text x="640" y="106" text-anchor="middle" class="acc">done</text>
  <text x="640" y="132" text-anchor="middle" class="text">cached response</text>
  <text x="640" y="152" text-anchor="middle" class="label">→ RETURN CACHED · NO SIDE EFFECT</text>

  <!-- Transitions -->
  <line x1="260" y1="123" x2="298" y2="123" class="a"/>
  <polygon points="298,123 288,118 288,128" class="fa"/>
  <text x="279" y="115" text-anchor="middle" class="label">SET NX</text>

  <line x1="500" y1="123" x2="538" y2="123" class="a"/>
  <polygon points="538,123 528,118 528,128" class="fa"/>
  <text x="519" y="115" text-anchor="middle" class="label">SET</text>

  <!-- Retry path callouts -->
  <line x1="40" y1="220" x2="760" y2="220" class="sm"/>

  <text x="40" y="252" class="label">RETRY ARRIVES</text>

  <rect x="60" y="270" width="200" height="56" rx="4" class="fs"/>
  <rect x="60" y="270" width="200" height="56" rx="4" class="s"/>
  <text x="160" y="293" text-anchor="middle" class="text">key absent · was first</text>
  <text x="160" y="313" text-anchor="middle" class="label">SHOULDN'T HAPPEN ON RETRY</text>

  <rect x="300" y="270" width="200" height="56" rx="4" class="fs"/>
  <rect x="300" y="270" width="200" height="56" rx="4" class="s"/>
  <text x="400" y="293" text-anchor="middle" class="text">poll until done</text>
  <text x="400" y="313" text-anchor="middle" class="label">EXPONENTIAL BACKOFF · 5s CAP</text>

  <rect x="540" y="270" width="200" height="56" rx="4" class="fs"/>
  <rect x="540" y="270" width="200" height="56" rx="4" class="s"/>
  <text x="640" y="293" text-anchor="middle" class="acc">return cached payload</text>
  <text x="640" y="313" text-anchor="middle" class="label">ONE REDIS GET · NO SIDE EFFECT</text>

  <text x="400" y="362" text-anchor="middle" class="label">THREE STATES · ONE TTL · ONE RACE-GUARD</text>
</svg>
