<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-shadow">
  <title id="t-shadow">Shadow traffic: send to both, return legacy, diff in the background</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">REQUEST · LEGACY ANSWERS USER · NEW SERVICE COMPARES</text>

  <!-- Request -->
  <rect x="40" y="80" width="100" height="44" rx="4" class="s"/>
  <text x="90" y="106" text-anchor="middle" class="mono">user request</text>

  <line x1="140" y1="102" x2="220" y2="102" class="a"/>
  <polygon points="220,102 210,97 210,107" class="fa"/>

  <!-- Facade -->
  <rect x="220" y="80" width="120" height="44" rx="4" class="fs"/>
  <rect x="220" y="80" width="120" height="44" rx="4" class="a"/>
  <text x="280" y="100" text-anchor="middle" class="acc">facade</text>
  <text x="280" y="116" text-anchor="middle" class="label">DUPLICATES</text>

  <!-- Branch up to legacy -->
  <line x1="340" y1="92" x2="440" y2="60" class="a"/>
  <polygon points="440,60 430,60 432,70" class="fa"/>

  <rect x="440" y="40" width="180" height="40" rx="3" class="s"/>
  <text x="530" y="64" text-anchor="middle" class="mono">legacy · returned to user</text>

  <!-- Branch down to new (shadow) -->
  <line x1="340" y1="112" x2="440" y2="144" class="a" stroke-dasharray="4 3"/>
  <polygon points="440,144 430,142 432,134" class="fa"/>

  <rect x="440" y="124" width="180" height="40" rx="3" class="s"/>
  <text x="530" y="148" text-anchor="middle" class="mono">new service · shadow only</text>

  <!-- Diff comparator -->
  <line x1="620" y1="60" x2="700" y2="100" class="a"/>
  <line x1="620" y1="144" x2="700" y2="104" class="a"/>

  <rect x="660" y="84" width="100" height="40" rx="3" class="fs"/>
  <rect x="660" y="84" width="100" height="40" rx="3" class="a"/>
  <text x="710" y="108" text-anchor="middle" class="acc">diff log</text>

  <line x1="40" y1="200" x2="760" y2="200" class="sm"/>

  <text x="40" y="226" class="label">DIFFS YOU FIND ON DAY 1 · BUGS YOU SHIP ON DAY 30 OTHERWISE</text>

  <rect x="40" y="244" width="220" height="56" rx="3" class="s"/>
  <text x="60" y="266" class="text">timezone bug · ±5h30m</text>
  <text x="60" y="284" class="label">→ FIXED IN NEW SERVICE</text>

  <rect x="285" y="244" width="220" height="56" rx="3" class="s"/>
  <text x="305" y="266" class="text">field as csv vs array</text>
  <text x="305" y="284" class="label">→ MATCH LEGACY SHAPE</text>

  <rect x="530" y="244" width="220" height="56" rx="3" class="s"/>
  <text x="550" y="266" class="text">legacy 500s 0.4% of calls</text>
  <text x="550" y="284" class="acc">→ BUG IN LEGACY · NOT NEW</text>
</svg>
