<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-setnx">
  <title id="t-setnx">SET NX EX — atomic claim of an idempotency key</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">ONE COMMAND · TWO QUESTIONS · ATOMIC</text>

  <rect x="40" y="64" width="720" height="60" rx="4" class="fs"/>
  <rect x="40" y="64" width="720" height="60" rx="4" class="a"/>
  <text x="400" y="92" text-anchor="middle" class="acc">SET key value NX EX 86400</text>
  <text x="400" y="110" text-anchor="middle" class="label">SET THIS · ONLY IF MISSING · EXPIRE IN 24H</text>

  <line x1="40" y1="158" x2="760" y2="158" class="sm"/>

  <!-- Path 1: First time -->
  <text x="40" y="190" class="label">01 — FIRST CALL · KEY ABSENT</text>

  <rect x="40" y="208" width="160" height="34" rx="3" class="s"/>
  <text x="120" y="230" text-anchor="middle" class="mono">SET NX</text>

  <line x1="200" y1="225" x2="240" y2="225" class="a"/>
  <polygon points="240,225 230,220 230,230" class="fa"/>

  <rect x="240" y="208" width="200" height="34" rx="3" class="s"/>
  <text x="340" y="230" text-anchor="middle" class="acc">→ "OK"</text>

  <line x1="440" y1="225" x2="480" y2="225" class="a"/>
  <polygon points="480,225 470,220 470,230" class="fa"/>

  <rect x="480" y="208" width="280" height="34" rx="3" class="s"/>
  <text x="620" y="230" text-anchor="middle" class="acc">claim is mine · do work · cache response</text>

  <!-- Path 2: Second time -->
  <text x="40" y="270" class="label">02 — RETRY · KEY EXISTS</text>

  <rect x="40" y="288" width="160" height="34" rx="3" class="s"/>
  <text x="120" y="310" text-anchor="middle" class="mono">SET NX</text>

  <line x1="200" y1="305" x2="240" y2="305" class="a"/>
  <polygon points="240,305 230,300 230,310" class="fa"/>

  <rect x="240" y="288" width="200" height="34" rx="3" class="s"/>
  <text x="340" y="310" text-anchor="middle" class="acc">→ nil</text>

  <line x1="440" y1="305" x2="480" y2="305" class="a"/>
  <polygon points="480,305 470,300 470,310" class="fa"/>

  <rect x="480" y="288" width="280" height="34" rx="3" class="s"/>
  <text x="620" y="310" text-anchor="middle" class="acc">read cached response · skip work</text>
</svg>
