<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-cb-tree">
  <title id="t-cb-tree">Is the breaker telling the truth? A decision tree.</title>
  <style>
    .text{fill:#1a1a24;font-family:Inter,system-ui,sans-serif;font-size:13px}
    .label{fill:#5c5c66;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .mono{fill:#1a1a24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px}
    .acc{fill:#6028d9;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px}
    .danger{fill:#c14545;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.08em}
    .s{stroke:#1a1a24;fill:none;stroke-width:1.25}
    .sm{stroke:#b3b3bd;fill:none;stroke-width:1;stroke-dasharray:4 4}
    .a{stroke:#6028d9;fill:none;stroke-width:1.5}
    .fa{fill:#6028d9}
    .fs{fill:#f5f1e6}
    @media (prefers-color-scheme: dark){
      .text{fill:#e8e4d8}.label{fill:#9c9ca6}.mono{fill:#e8e4d8}.acc{fill:#b89be8}.danger{fill:#d97a7a}
      .s{stroke:#e8e4d8}.sm{stroke:#4a4a55}.a{stroke:#b89be8}.fa{fill:#b89be8}.fs{fill:#1a1a24}
    }
  </style>

  <text x="40" y="36" class="label">YOUR BREAKER TRIPPED · IS THE DOWNSTREAM ACTUALLY DOWN?</text>

  <!-- Root question -->
  <rect x="280" y="60" width="240" height="44" rx="4" class="fs"/>
  <rect x="280" y="60" width="240" height="44" rx="4" class="a"/>
  <text x="400" y="86" text-anchor="middle" class="acc">downstream metric green?</text>

  <!-- Left branch: yes -->
  <line x1="380" y1="104" x2="180" y2="140" class="a"/>
  <polygon points="180,140 187,142 187,132" class="fa"/>
  <text x="280" y="124" text-anchor="end" class="label">YES</text>

  <rect x="40" y="148" width="280" height="44" rx="4" class="s"/>
  <text x="180" y="174" text-anchor="middle" class="text">breaker is wrong · check signal</text>

  <line x1="180" y1="192" x2="180" y2="220" class="a"/>
  <polygon points="180,220 175,210 185,210" class="fa"/>

  <rect x="40" y="228" width="280" height="120" rx="4" class="s"/>
  <text x="180" y="254" text-anchor="middle" class="text">→ slow vs failed?</text>
  <text x="180" y="278" text-anchor="middle" class="text">→ ramp-up exemption?</text>
  <text x="180" y="302" text-anchor="middle" class="text">→ per-pod variance?</text>
  <text x="180" y="328" text-anchor="middle" class="acc">FIX THE SIGNAL · NOT THE BREAKER</text>

  <!-- Right branch: no -->
  <line x1="420" y1="104" x2="620" y2="140" class="a"/>
  <polygon points="620,140 612,132 612,142" class="fa"/>
  <text x="520" y="124" text-anchor="start" class="label">NO</text>

  <rect x="480" y="148" width="280" height="44" rx="4" class="s"/>
  <text x="620" y="174" text-anchor="middle" class="text">downstream is actually broken</text>

  <line x1="620" y1="192" x2="620" y2="220" class="a"/>
  <polygon points="620,220 615,210 625,210" class="fa"/>

  <rect x="480" y="228" width="280" height="120" rx="4" class="fs"/>
  <rect x="480" y="228" width="280" height="120" rx="4" class="a"/>
  <text x="620" y="254" text-anchor="middle" class="text">→ breaker is doing its job</text>
  <text x="620" y="278" text-anchor="middle" class="text">→ recovery: tune half-open</text>
  <text x="620" y="302" text-anchor="middle" class="text">→ alert on duration, not state</text>
  <text x="620" y="328" text-anchor="middle" class="acc">LET IT RECOVER · WATCH THE METRIC</text>

  <text x="400" y="370" text-anchor="middle" class="label">A TRIPPED BREAKER IS A HYPOTHESIS · VALIDATE BEFORE YOU ACT</text>
</svg>
