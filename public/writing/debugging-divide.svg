<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#1e293b" rx="8"/>
  <text x="400" y="40" fill="#e2e8f0" font-family="sans-serif" font-size="22" text-anchor="middle" font-weight="bold">Divide and Conquer (Binary Search)</text>

  <rect x="100" y="100" width="150" height="120" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="175" y="150" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">Frontend UI</text>
  <text x="175" y="180" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Is payload correct?</text>

  <path d="M 260 160 L 330 160" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="350" y="100" width="150" height="120" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="425" y="150" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">API Route</text>
  <text x="425" y="180" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Is logic failing?</text>

  <path d="M 510 160 L 580 160" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="600" y="100" width="150" height="120" fill="#334155" rx="8" stroke="#475569" stroke-width="2"/>
  <text x="675" y="150" fill="#f8fafc" font-family="sans-serif" font-size="18" text-anchor="middle">Database</text>
  <text x="675" y="180" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Is query wrong?</text>

  <line x1="175" y1="240" x2="675" y2="240" stroke="#ef4444" stroke-width="4" stroke-dasharray="8,8" />
  <text x="425" y="270" fill="#fca5a5" font-family="sans-serif" font-size="14" text-anchor="middle">Slice the system in half to find the error boundary</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
    </marker>
  </defs>
</svg>
